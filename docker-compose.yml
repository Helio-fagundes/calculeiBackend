version: '3.8'

services:
  db:
    image: postgres:17-alpine
    container_name: postgres-calculei
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: calculei
      POSTGRES_PASSWORD: calculei123
      POSTGRES_DB: calculei
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: